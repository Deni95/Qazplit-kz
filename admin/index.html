<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>QAZPLITT Админка</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
padding:30px;
}

.box{
max-width:800px;
margin:auto;
background:#1d1d1d;
padding:25px;
border-radius:15px;
}

input,
textarea,
button{
width:100%;
padding:12px;
margin:8px 0;
}

button{
background:#d89b18;
border:none;
font-weight:bold;
cursor:pointer;
}

img{
width:180px;
border-radius:10px;
margin-top:10px;
}

.card{
background:#2b2b2b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box" id="login">

<h1>Вход администратора</h1>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Пароль">

<button onclick="login()">

Войти

</button>

</div>



<div
class="box"
id="admin"
style="display:none">

<h1>

QAZPLITT Админка

</h1>

<input
id="name"
placeholder="Название">

<input
id="price"
placeholder="Цена">

<textarea
id="description"
placeholder="Описание"></textarea>

<input
type="file"
id="image">

<button onclick="addProduct()">

Добавить товар

</button>

<button onclick="logout()">

Выйти

</button>

<div id="products"></div>

</div>



<script>

const SUPABASE_URL=
"https://qsoukelbdkojofqyorfu.supabase.co";

const SUPABASE_KEY=
"sb_publishable_dek8j5Pe9ds1mX1S_X5ylw_OiJGRU47";

const sb=
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY,
{
auth:{
persistSession:true,
autoRefreshToken:true
}
}
);



async function login(){

let email=
document.getElementById(
"email"
).value;

let password=
document.getElementById(
"password"
).value;

let {error}=
await sb.auth
.signInWithPassword({

email,
password

});

if(error){

alert(error.message);

return;

}

showAdmin();

}



async function logout(){

await sb.auth.signOut();

location.reload();

}



function showAdmin(){

document
.getElementById("login")
.style.display="none";

document
.getElementById("admin")
.style.display="block";

loadProducts();

}



async function addProduct(){

let name=
document.getElementById(
"name"
).value;

let price=
document.getElementById(
"price"
).value;

let description=
document.getElementById(
"description"
).value;

let file=
document.getElementById(
"image"
).files[0];

let filename=
Date.now()+"-"+file.name;

let upload=
await sb.storage
.from("product-images")
.upload(
filename,
file
);

if(upload.error){

alert(
upload.error.message
);

return;

}

let image=
sb.storage
.from("product-images")
.getPublicUrl(
filename
);

let url=
image.data.publicUrl;

await sb
.from("products")
.insert({

name,
price,
description,
image_url:url

});

loadProducts();

}



async function loadProducts(){

let res=
await sb
.from("products")
.select("*")
.order(
"created_at",
{
ascending:false
}
);

let html="";

res.data.forEach(
item=>{

html+=`

<div class="card">

<h3>

${item.name}

</h3>

<p>

${item.price}

</p>

<p>

${item.description}

</p>

<img src="${item.image_url}">

<button
onclick="deleteProduct(
'${item.id}'
)">

Удалить

</button>

</div>

`;

});

document
.getElementById(
"products"
)
.innerHTML=
html;

}



async function deleteProduct(
id
){

await sb
.from("products")
.delete()
.eq(
"id",
id
);

loadProducts();

}



sb.auth
.getSession()
.then(
({data})=>{

if(
data.session
){

showAdmin();

}

}
);

</script>

</body>
</html>
