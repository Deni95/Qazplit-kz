<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>QAZPLITT Админка</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  margin:0;
  padding:30px;
}
.box{
  max-width:800px;
  margin:auto;
  background:#1d1d1d;
  padding:25px;
  border-radius:15px;
}
input, textarea, button{
  width:100%;
  padding:12px;
  margin:8px 0;
  box-sizing:border-box;
}
button{
  background:#d89b18;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
img{
  width:180px;
  border-radius:10px;
  margin-top:10px;
}
.card{
  background:#2b2b2b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box" id="login">
  <h1>Вход администратора</h1>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<div class="box" id="admin" style="display:none">
  <h1>QAZPLITT Админка</h1>

  <input id="name" placeholder="Название">
  <input id="price" placeholder="Цена">
  <textarea id="description" placeholder="Описание"></textarea>
  <input type="file" id="image" accept="image/*">

  <button onclick="addProduct()">Добавить товар</button>
  <button onclick="logout()">Выйти</button>

  <div id="products"></div>
</div>

<script>
const SUPABASE_URL = "https://qsoukelbdkojofqyorfu.supabase.co";
const SUPABASE_KEY = "sb_publishable_dek8j5Pe9ds1mX1S_X5ylw_OiJGRU47";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{
    persistSession:true,
    autoRefreshToken:true
  }
});

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Ошибка входа: " + error.message);
    return;
  }

  showAdmin();
}

async function logout(){
  await sb.auth.signOut();
  location.reload();
}

function showAdmin(){
  document.getElementById("login").style.display = "none";
  document.getElementById("admin").style.display = "block";
  loadProducts();
}

async function addProduct(){
  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const description = document.getElementById("description").value.trim();
  const file = document.getElementById("image").files[0];

  if(!name){
    alert("Введите название товара");
    return;
  }

  if(!price){
    alert("Введите цену");
    return;
  }

  if(!file){
    alert("Выберите фото товара");
    return;
  }

  const safeFileName = Date.now() + "-" + file.name.replaceAll(" ", "-");

  const upload = await sb.storage
    .from("product-images")
    .upload(safeFileName, file);

  if(upload.error){
    alert("Ошибка загрузки фото: " + upload.error.message);
    return;
  }

  const image = sb.storage
    .from("product-images")
    .getPublicUrl(safeFileName);

  const imageUrl = image.data.publicUrl;

  const insert = await sb
    .from("products")
    .insert({
      name: name,
      price: price,
      description: description,
      image_url: imageUrl
    });

  if(insert.error){
    alert("Ошибка добавления товара: " + insert.error.message);
    return;
  }

  alert("Товар добавлен!");

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("description").value = "";
  document.getElementById("image").value = "";

  loadProducts();
}

async function loadProducts(){
  const res = await sb
    .from("products")
    .select("*")
    .order("created_at", { ascending:false });

  if(res.error){
    alert("Ошибка загрузки товаров: " + res.error.message);
    return;
  }

  let html = "";

  res.data.forEach(item=>{
    html += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>${item.price}</p>
        <p>${item.description || ""}</p>
        <img src="${item.image_url}">
        <button onclick="deleteProduct('${item.id}')">Удалить</button>
      </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

async function deleteProduct(id){
  const result = await sb
    .from("products")
    .delete()
    .eq("id", id);

  if(result.error){
    alert("Ошибка удаления: " + result.error.message);
    return;
  }

  loadProducts();
}

sb.auth.getSession().then(({data})=>{
  if(data.session){
    showAdmin();
  }
});
</script>

</body>
</html>
