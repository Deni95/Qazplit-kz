<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QAZ PLIT Админка</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

.box{
max-width:900px;
margin:auto;
background:#1d1d1d;
padding:25px;
border-radius:12px;
}

input,
textarea,
button{
width:100%;
padding:12px;
margin:8px 0;
box-sizing:border-box;
}

button{
background:#d79a18;
border:none;
font-weight:bold;
cursor:pointer;
}

.card{
background:#2b2b2b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

img{
max-width:180px;
border-radius:10px;
margin-top:10px;
display:block;
}
</style>

</head>

<body>

<div class="box" id="login">

<h1>Вход администратора</h1>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Пароль">

<button onclick="login()">

Войти

</button>

</div>



<div
class="box"
id="admin"
style="display:none">

<h1>

QAZ PLIT

</h1>

<h2>Настройки сайта</h2>

<input
id="companyName"
placeholder="Название фирмы">

<button onclick="saveCompanyName()">

Сохранить название

</button>



<input
type="file"
id="heroImage">

<button onclick="uploadHero()">

Изменить главное фото

</button>



<input
type="file"
id="logoImage">

<button onclick="uploadLogo()">

Изменить логотип

</button>



<hr>



<h2>

Добавить товар

</h2>

<input
id="name"
placeholder="Название">


<input
id="price"
placeholder="Цена">


<textarea
id="description"
placeholder="Описание"></textarea>


<input
type="file"
id="image">


<button onclick="addProduct()">

Добавить товар

</button>



<button onclick="logout()">

Выйти

</button>



<div id="products"></div>

</div>



<script>

const SUPABASE_URL =
"https://qsoukelbdkojofqyorfu.supabase.co";

const SUPABASE_KEY =
"YOUR_SUPABASE_KEY";

const sb =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



async function login(){

let email =
document.getElementById(
"email"
).value;

let password =
document.getElementById(
"password"
).value;

let {error} =
await sb.auth
.signInWithPassword({

email,
password

});

if(error){

alert(
error.message
);

return;

}

showAdmin();

}



async function logout(){

await sb.auth.signOut();

location.reload();

}



function showAdmin(){

document
.getElementById(
"login"
)
.style.display="none";

document
.getElementById(
"admin"
)
.style.display="block";

loadProducts();

loadSettings();

}



async function saveCompanyName(){

let name =
document.getElementById(
"companyName"
).value;

await sb
.from(
"site_settings"
)
.upsert({

id:1,

company_name:name

});

alert(
"Сохранено"
);

}



async function uploadHero(){

let file =
document.getElementById(
"heroImage"
).files[0];

let filename =
"hero-"+Date.now();

await sb.storage
.from(
"site-images"
)
.upload(
filename,
file
);

let url =
sb.storage
.from(
"site-images"
)
.getPublicUrl(
filename
);

await sb
.from(
"site_settings"
)
.upsert({

id:1,

hero_image_url:
url.data.publicUrl

});

alert(
"Главное фото обновлено"
);

}



async function uploadLogo(){

let file =
document.getElementById(
"logoImage"
).files[0];

let filename =
"logo-"+Date.now();

await sb.storage
.from(
"site-images"
)
.upload(
filename,
file
);

let url =
sb.storage
.from(
"site-images"
)
.getPublicUrl(
filename
);

await sb
.from(
"site_settings"
)
.upsert({

id:1,

logo_url:
url.data.publicUrl

});

alert(
"Логотип обновлён"
);

}



async function addProduct(){

let name =
document.getElementById(
"name"
).value;

let price =
document.getElementById(
"price"
).value;

let description =
document.getElementById(
"description"
).value;

let file =
document.getElementById(
"image"
).files[0];

let filename =
Date.now()
+"-"+file.name;

await sb.storage
.from(
"product-images"
)
.upload(
filename,
file
);

let url =
sb.storage
.from(
"product-images"
)
.getPublicUrl(
filename
);

await sb
.from(
"products"
)
.insert({

name,
price,
description,

image_url:
url.data.publicUrl

});

loadProducts();

}



async function loadSettings(){

let res =
await sb
.from(
"site_settings"
)
.select("*")
.eq(
"id",
1
)
.single();

if(res.data){

document
.getElementById(
"companyName"
)
.value =
res.data.company_name
||"";

}

}



async function loadProducts(){

let res =
await sb
.from(
"products"
)
.select("*");

let html="";

res.data.forEach(
item=>{

html += `

<div class="card">

<h3>

${item.name}

</h3>

<p>

${item.price}

</p>

<p>

${item.description}

</p>

<img src="${item.image_url}">

<button
onclick="deleteProduct(
'${item.id}'
)">

Удалить

</button>

</div>

`;

});

document
.getElementById(
"products"
)
.innerHTML =
html;

}



async function deleteProduct(id){

await sb
.from(
"products"
)
.delete()
.eq(
"id",
id
);

loadProducts();

}



sb.auth
.getSession()
.then(
({data})=>{

if(
data.session
){

showAdmin();

}

}
);

</script>

</body>
</html>
