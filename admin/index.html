<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>QAZ-PLIT — Админка</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;padding:30px}
.box{max-width:900px;margin:auto;background:#1d1d1d;padding:25px;border-radius:14px}
input,textarea,button{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{background:#d99a16;border:0;font-weight:bold;cursor:pointer;border-radius:6px}
.card{background:#2a2a2a;padding:15px;margin-top:15px;border-radius:10px}
img{max-width:180px;border-radius:8px;margin:10px 0;display:block}
hr{border:0;border-top:1px solid #444;margin:25px 0}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <h1>Вход администратора</h1>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<div class="box" id="adminBox" style="display:none;">
  <h1>QAZ-PLIT — админка</h1>

  <h2>Главная страница</h2>
  <input id="companyName" placeholder="Название фирмы">
  <input id="heroImage" type="file" accept="image/*">
  <button onclick="uploadHero()">Обновить главное фото</button>

  <input id="logoImage" type="file" accept="image/*">
  <button onclick="uploadLogo()">Обновить логотип</button>

  <hr>

  <h2>Добавить товар</h2>
  <input id="name" placeholder="Название товара">
  <input id="price" placeholder="Цена">
  <textarea id="description" placeholder="Описание"></textarea>
  <input id="image" type="file" accept="image/*">
  <button onclick="addProduct()">Добавить товар</button>

  <button onclick="logout()">Выйти</button>

  <h2>Список товаров</h2>
  <div id="products"></div>
</div>

<script>
const SUPABASE_URL = "https://qsoukelbdkojofqyorfu.supabase.co";
const SUPABASE_KEY = "sb_publishable_dek8j5Pe9ds1mX1S_X5ylw_OiJGRU47";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true
  }
});

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    alert("Ошибка входа: " + error.message);
    return;
  }

  showAdmin();
}

async function logout(){
  await sb.auth.signOut();
  location.reload();
}

function showAdmin(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("adminBox").style.display = "block";
  loadSettings();
  loadProducts();
}

async function uploadHero(){
  const file = document.getElementById("heroImage").files[0];
  const companyName = document.getElementById("companyName").value || "QAZPLITT";

  if(!file){
    alert("Выбери фото главного экрана");
    return;
  }

  const fileName = "hero-" + Date.now() + "-" + file.name;

  const { error } = await sb.storage
    .from("site-images")
    .upload(fileName, file);

  if(error){
    alert("Ошибка загрузки главного фото: " + error.message);
    return;
  }

  const { data } = sb.storage
    .from("site-images")
    .getPublicUrl(fileName);

  const { error: dbError } = await sb
    .from("site_settings")
    .upsert({
      id: 1,
      company_name: companyName,
      hero_image_url: data.publicUrl
    });

  if(dbError){
    alert("Ошибка сохранения: " + dbError.message);
    return;
  }

  alert("Главное фото обновлено");
}

async function uploadLogo(){
  const file = document.getElementById("logoImage").files[0];
  const companyName = document.getElementById("companyName").value || "QAZPLITT";

  if(!file){
    alert("Выбери логотип");
    return;
  }

  const fileName = "logo-" + Date.now() + "-" + file.name;

  const { error } = await sb.storage
    .from("site-images")
    .upload(fileName, file);

  if(error){
    alert("Ошибка загрузки логотипа: " + error.message);
    return;
  }

  const { data } = sb.storage
    .from("site-images")
    .getPublicUrl(fileName);

  const { error: dbError } = await sb
    .from("site_settings")
    .upsert({
      id: 1,
      company_name: companyName,
      logo_url: data.publicUrl
    });

  if(dbError){
    alert("Ошибка сохранения: " + dbError.message);
    return;
  }

  alert("Логотип обновлён");
}

async function loadSettings(){
  const { data } = await sb
    .from("site_settings")
    .select("*")
    .eq("id", 1)
    .single();

  if(data && data.company_name){
    document.getElementById("companyName").value = data.company_name;
  }
}

async function addProduct(){
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const description = document.getElementById("description").value;
  const file = document.getElementById("image").files[0];

  if(!name || !price || !file){
    alert("Заполни название, цену и фото");
    return;
  }

  const fileName = "product-" + Date.now() + "-" + file.name;

  const { error } = await sb.storage
    .from("product-images")
    .upload(fileName, file);

  if(error){
    alert("Ошибка загрузки фото товара: " + error.message);
    return;
  }

  const { data } = sb.storage
    .from("product-images")
    .getPublicUrl(fileName);

  const { error: dbError } = await sb
    .from("products")
    .insert({
      name,
      price,
      description,
      image_url: data.publicUrl
    });

  if(dbError){
    alert("Ошибка добавления товара: " + dbError.message);
    return;
  }

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("description").value = "";
  document.getElementById("image").value = "";

  alert("Товар добавлен");
  loadProducts();
}

async function loadProducts(){
  const { data, error } = await sb
    .from("products")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    alert("Ошибка загрузки товаров: " + error.message);
    return;
  }

  document.getElementById("products").innerHTML = data.map(item => `
    <div class="card">
      <h3>${item.name}</h3>
      <p>${item.description || ""}</p>
      <strong>${item.price}</strong>
      <img src="${item.image_url}">
      <button onclick="deleteProduct('${item.id}')">Удалить</button>
    </div>
  `).join("");
}

async function deleteProduct(id){
  if(!confirm("Удалить товар?")) return;

  const { error } = await sb
    .from("products")
    .delete()
    .eq("id", id);

  if(error){
    alert("Ошибка удаления: " + error.message);
    return;
  }

  loadProducts();
}

sb.auth.getSession().then(({ data }) => {
  if(data.session){
    showAdmin();
  }
});
</script>

</body>
</html>
