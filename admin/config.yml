backend:
  name: git-gateway
  branch: main

site_url: https://qazplittpvl.netlify.app
display_url: https://qazplittpvl.netlify.app

media_folder: "uploads"
public_folder: "/uploads"

collections:

  - name: "site"
    label: "1. Настройки сайта"

    files:
      - file: "content/site.json"
        label: "Главная страница"
        name: "site"

        fields:

          - {label: "Название фирмы", name: "company", widget: "string"}

          - {label: "Главный заголовок", name: "title", widget: "string"}

          - {label: "Описание", name: "subtitle", widget: "text"}

          - {label: "Фоновое фото", name: "hero", widget: "image"}

          - {label: "Телефон", name: "phone", widget: "string"}

          - {label: "WhatsApp", name: "whatsapp", widget: "string"}

          - {label: "Адрес", name: "address", widget: "string"}

          - {label: "Режим работы", name: "worktime", widget: "string"}

  - name: "products"
    label: "2. Каталог"

    files:
      - file: "content/products.json"
        label: "Товары"
        name: "products"

        fields:

          - label: "Товары"

            name: "items"

            widget: "list"

            fields:

              - {label: "Название", name: "name", widget: "string"}

              - {label: "Цена", name: "price", widget: "string"}

              - {label: "Описание", name: "description", widget: "text"}

              - {label: "Фото", name: "image", widget: "image"}

              - {label: "Показывать", name: "active", widget: "boolean", default: true}

  - name: "works"
    label: "3. Наши работы"

    files:
      - file: "content/works.json"
        label: "Работы"
        name: "works"

        fields:

          - label: "Работы"

            name: "items"

            widget: "list"

            fields:

              - {label: "Название", name: "title", widget: "string"}

              - {label: "Описание", name: "description", widget: "text"}

              - {label: "Фото", name: "image", widget: "image"}

  - name: "reviews"
    label: "4. Отзывы"

    files:
      - file: "content/reviews.json"
        label: "Отзывы"
        name: "reviews"

        fields:

          - label: "Отзывы"

            name: "items"

            widget: "list"

            fields:

              - {label: "Имя", name: "name", widget: "string"}

              - {label: "Текст", name: "text", widget: "text"}

              - {label: "Оценка", name: "rating", widget: "number"}
