backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

locale: "ru"

collections:
  - name: "products"
    label: "Каталог брусчатки"
    files:
      - file: "content/products.json"
        label: "Товары"
        name: "products_file"
        fields:
          - label: "Товары"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - label: "Название"
                name: "name"
                widget: "string"

              - label: "Описание"
                name: "description"
                widget: "text"

              - label: "Цена"
                name: "price"
                widget: "string"

              - label: "Фото"
                name: "image"
                widget: "image"

  - name: "settings"
    label: "Настройки сайта"
    files:
      - file: "content/settings.json"
        label: "Контакты"
        name: "settings_file"
        fields:
          - label: "Название компании"
            name: "company"
            widget: "string"

          - label: "Телефон"
            name: "phone"
            widget: "string"

          - label: "WhatsApp"
            name: "whatsapp"
            widget: "string"

          - label: "Город"
            name: "city"
            widget: "string"
