<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D конструктор QAZPLIT</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#06080a;color:#fff}button,input,select{font:inherit}.scene{position:fixed;inset:0}.scene canvas{display:block;width:100%;height:100%}.topbar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;gap:18px;padding:16px 22px;background:linear-gradient(180deg,rgba(5,7,9,.9),rgba(5,7,9,.35));pointer-events:none}.brand{display:flex;align-items:center;gap:10px;margin-right:auto;pointer-events:auto}.brand img{width:56px;height:56px;object-fit:contain}.brand-title{font-size:25px;font-weight:900;color:#d99a16;line-height:1}.brand-sub{font-size:11px;color:#ddd;letter-spacing:.8px;text-transform:uppercase;margin-top:4px}.top-link{pointer-events:auto;border:1px solid #d99a16;color:#d99a16;padding:11px 16px;border-radius:6px;text-decoration:none;font-weight:800;background:rgba(0,0,0,.18)}.panel{position:fixed;z-index:6;left:22px;bottom:22px;width:min(390px,calc(100vw - 44px));max-height:calc(100vh - 124px);overflow:auto;background:rgba(12,15,18,.9);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:18px;box-shadow:0 22px 70px rgba(0,0,0,.45);backdrop-filter:blur(12px)}.panel h1{font-size:24px;margin:0 0 14px;text-transform:uppercase}.group{margin-top:15px}.label{display:block;color:#cfcfcf;font-size:13px;font-weight:800;margin-bottom:8px;text-transform:uppercase}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.seg button,.action{border:1px solid rgba(255,255,255,.16);background:#0a0d10;color:#fff;border-radius:6px;padding:11px 8px;font-weight:800;cursor:pointer}.seg button.active,.action.primary{background:#d99a16;color:#050607;border-color:#d99a16}.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.swatch{height:38px;border-radius:6px;border:2px solid rgba(255,255,255,.2);cursor:pointer}.swatch.active{border-color:#fff;box-shadow:0 0 0 2px #d99a16}.row{display:grid;grid-template-columns:1fr 96px;gap:10px;align-items:center}.range{width:100%;accent-color:#d99a16}.value{background:#080a0d;border:1px solid rgba(255,255,255,.16);border-radius:6px;padding:10px;text-align:center;font-weight:900;color:#d99a16}.select{width:100%;background:#080a0d;border:1px solid rgba(255,255,255,.16);color:#fff;padding:12px;border-radius:6px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.stat{background:#080a0d;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:13px}.stat small{display:block;color:#aaa;margin-bottom:5px}.stat b{font-size:20px;color:#d99a16}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.toast{position:fixed;right:22px;bottom:22px;z-index:7;background:rgba(12,15,18,.92);border:1px solid rgba(217,154,22,.45);border-radius:8px;padding:14px 16px;color:#fff;font-weight:800;opacity:0;transform:translateY(12px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:760px){.topbar{padding:12px;gap:10px}.brand img{width:44px;height:44px}.brand-title{font-size:20px}.top-link{padding:9px 10px;font-size:13px}.panel{left:12px;right:12px;bottom:12px;width:auto;max-height:48vh;padding:14px}.panel h1{font-size:20px}.seg{grid-template-columns:1fr}.swatches{grid-template-columns:repeat(3,1fr)}.stats{grid-template-columns:1fr}.actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="scene" id="scene"></div>
<header class="topbar">
<a class="brand" href="../index.html">
<img src="../uploads/new.png" alt="QAZPLIT">
<span><span class="brand-title">QAZPLIT</span><span class="brand-sub">3D конструктор двора</span></span>
</a>
<a class="top-link" href="../index.html">На сайт</a>
<a class="top-link" href="https://wa.me/7771233002" target="_blank">WhatsApp</a>
</header>

<aside class="panel">
<h1>Конструктор брусчатки</h1>
<div class="group">
<span class="label">Форма</span>
<div class="seg" id="shapeButtons">
<button data-shape="brick" class="active">Кирпич</button>
<button data-shape="square">Квадрат</button>
<button data-shape="stone">Камень</button>
</div>
</div>
<div class="group">
<span class="label">Укладка</span>
<select class="select" id="pattern">
<option value="running">Разбежка</option>
<option value="grid">Прямая</option>
<option value="herringbone">Ёлочка</option>
</select>
</div>
<div class="group">
<span class="label">Цвет</span>
<div class="swatches" id="swatches"></div>
</div>
<div class="group">
<span class="label">Размер двора</span>
<div class="row"><input class="range" id="yardSize" type="range" min="8" max="18" value="12"><div class="value"><span id="yardValue">12</span> м</div></div>
</div>
<div class="group">
<span class="label">Ширина дорожки</span>
<div class="row"><input class="range" id="pathWidth" type="range" min="2" max="6" value="4"><div class="value"><span id="pathValue">4</span> м</div></div>
</div>
<div class="stats">
<div class="stat"><small>Площадь</small><b id="areaValue">0 м²</b></div>
<div class="stat"><small>Плиток</small><b id="tileValue">0</b></div>
</div>
<div class="actions">
<button class="action primary" id="resetView">Сброс вида</button>
<button class="action" id="randomize">Вариант</button>
</div>
</aside>
<div class="toast" id="toast">Вариант обновлён</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/controls/OrbitControls.js';

const colors = [
{name:'Графит', value:0x353535},
{name:'Песочный', value:0xb98c52},
{name:'Терракот', value:0x8d3f2e},
{name:'Серый', value:0x77756f},
{name:'Оливковый', value:0x59604a},
{name:'Микс', value:0x9d7a55}
];

const state = {shape:'brick', pattern:'running', color:colors[0].value, yardSize:12, pathWidth:4};
const sceneHost = document.getElementById('scene');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f12);
scene.fog = new THREE.Fog(0x0b0f12, 18, 42);

const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, .1, 120);
camera.position.set(10, 9, 12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
sceneHost.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.maxPolarAngle = Math.PI * .48;
controls.minDistance = 7;
controls.maxDistance = 30;
controls.update();

scene.add(new THREE.HemisphereLight(0xf7f0df, 0x303948, 1.3));
const sun = new THREE.DirectionalLight(0xffedd0, 3.2);
sun.position.set(9, 12, 7);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -18;
sun.shadow.camera.right = 18;
sun.shadow.camera.top = 18;
sun.shadow.camera.bottom = -18;
scene.add(sun);

const world = new THREE.Group();
scene.add(world);
let paverGroup = new THREE.Group();
world.add(paverGroup);

const groundMat = new THREE.MeshStandardMaterial({color:0x172017, roughness:.9});
const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -.04;
ground.receiveShadow = true;
world.add(ground);

function addHouse(){
const house = new THREE.Group();
const wallMat = new THREE.MeshStandardMaterial({color:0xd8d0bf, roughness:.72});
const roofMat = new THREE.MeshStandardMaterial({color:0x4a1f18, roughness:.75});
const trimMat = new THREE.MeshStandardMaterial({color:0x232323, roughness:.6});
const base = new THREE.Mesh(new THREE.BoxGeometry(4.2, 2.3, 4), wallMat);
base.position.y = 1.15;base.castShadow = true;base.receiveShadow = true;house.add(base);
const roof = new THREE.Mesh(new THREE.ConeGeometry(3.45, 1.5, 4), roofMat);
roof.rotation.y = Math.PI / 4;roof.position.y = 3.05;roof.scale.z = .9;roof.castShadow = true;house.add(roof);
for(const x of [-1.25, 1.25]){
const win = new THREE.Mesh(new THREE.BoxGeometry(.72, .62, .08), trimMat);
win.position.set(x, 1.38, 2.04);house.add(win);
}
const door = new THREE.Mesh(new THREE.BoxGeometry(.78, 1.2, .1), trimMat);
door.position.set(0, .6, 2.06);house.add(door);
house.position.set(0, 0, 0);
world.add(house);
}

function makePaverMaterial(baseColor, n){
const c = new THREE.Color(baseColor);
const hsl = {}; c.getHSL(hsl);
hsl.l = Math.max(.18, Math.min(.72, hsl.l + (Math.random() - .5) * .12));
hsl.s = Math.max(.05, Math.min(.55, hsl.s + (Math.random() - .5) * .08));
const mat = new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l), roughness:.86, metalness:0});
if(state.color === colors[5].value){
const mixed = [0x4a4a46,0x7b664c,0x9c6a43,0x5a5f54,0x8d3f2e][n % 5];
mat.color.setHex(mixed);
}
return mat;
}

function paverDimensions(){
if(state.shape === 'square') return {w:.72, d:.72, h:.12};
if(state.shape === 'stone') return {w:.78, d:.58, h:.12};
return {w:.92, d:.46, h:.12};
}

function clearGroup(group){
while(group.children.length){
const child = group.children.pop();
child.geometry?.dispose();
child.material?.dispose();
}
}

function inHouse(x, z){return Math.abs(x) < 2.35 && Math.abs(z) < 2.25;}
function inPavedArea(x, z, half, width){
const aroundHouse = Math.abs(x) < 3.1 + width && Math.abs(z) < 3 + width;
const frontPath = Math.abs(x) < width * .72 && z > 1.7 && z < half;
const driveway = x > 2.1 && x < half && z > 1.4 && z < 4.2;
return (aroundHouse || frontPath || driveway) && Math.abs(x) < half && Math.abs(z) < half && !inHouse(x,z);
}

function rebuildPavers(){
clearGroup(paverGroup);
const {w,d,h} = paverDimensions();
const half = state.yardSize / 2;
const width = state.pathWidth / 2;
let count = 0;
let area = 0;
for(let z = -half; z <= half; z += d + .035){
for(let x = -half; x <= half; x += w + .035){
if(!inPavedArea(x, z, half, width)) continue;
let px = x, pz = z, rot = 0;
if(state.pattern === 'running' && Math.round((z + half) / d) % 2) px += w * .5;
if(state.pattern === 'herringbone'){
rot = count % 2 ? Math.PI / 2 : 0;
px += (count % 4) * .05;
pz += (count % 3) * .04;
}
const geo = state.shape === 'stone' ? new THREE.BoxGeometry(w * (.9 + Math.random() * .16), h, d * (.9 + Math.random() * .16), 2, 1, 2) : new THREE.BoxGeometry(w, h, d);
const mesh = new THREE.Mesh(geo, makePaverMaterial(state.color, count));
mesh.position.set(px, h / 2, pz);
mesh.rotation.y = rot;
mesh.castShadow = true;
mesh.receiveShadow = true;
paverGroup.add(mesh);
count++;
area += w * d;
}
}
document.getElementById('areaValue').textContent = Math.round(area) + ' м²';
document.getElementById('tileValue').textContent = count;
}

function addYardDetails(){
const fenceMat = new THREE.MeshStandardMaterial({color:0x2e241a, roughness:.8});
const hedgeMat = new THREE.MeshStandardMaterial({color:0x1f4a2d, roughness:.9});
for(let i=-8;i<=8;i+=2){
for(const z of [-8,8]){const post = new THREE.Mesh(new THREE.BoxGeometry(.12,.7,.12), fenceMat);post.position.set(i,.35,z);post.castShadow=true;world.add(post);}
for(const x of [-8,8]){const post = new THREE.Mesh(new THREE.BoxGeometry(.12,.7,.12), fenceMat);post.position.set(x,.35,i);post.castShadow=true;world.add(post);}
}
for(const pos of [[-5.8,.35,-5.5],[5.4,.35,-5.2],[-6.2,.35,4.5]]){
const bush = new THREE.Mesh(new THREE.SphereGeometry(.55,16,10), hedgeMat);bush.position.set(...pos);bush.castShadow=true;world.add(bush);
}
}

function updateSwatches(){
const wrap = document.getElementById('swatches');
wrap.innerHTML = '';
colors.forEach(item => {
const btn = document.createElement('button');
btn.className = 'swatch' + (item.value === state.color ? ' active' : '');
btn.title = item.name;
btn.style.background = '#' + item.value.toString(16).padStart(6,'0');
btn.addEventListener('click', () => {state.color = item.value; updateSwatches(); rebuildPavers();});
wrap.appendChild(btn);
});
}

function setShape(shape){state.shape = shape;document.querySelectorAll('#shapeButtons button').forEach(btn => btn.classList.toggle('active', btn.dataset.shape === shape));rebuildPavers();}
document.querySelectorAll('#shapeButtons button').forEach(btn => btn.addEventListener('click', () => setShape(btn.dataset.shape)));
document.getElementById('pattern').addEventListener('change', event => {state.pattern = event.target.value;rebuildPavers();});
document.getElementById('yardSize').addEventListener('input', event => {state.yardSize = Number(event.target.value);document.getElementById('yardValue').textContent = state.yardSize;rebuildPavers();});
document.getElementById('pathWidth').addEventListener('input', event => {state.pathWidth = Number(event.target.value);document.getElementById('pathValue').textContent = state.pathWidth;rebuildPavers();});
document.getElementById('resetView').addEventListener('click', () => {camera.position.set(10,9,12);controls.target.set(0,0,0);controls.update();});
document.getElementById('randomize').addEventListener('click', () => {
const shapes = ['brick','square','stone'];
state.shape = shapes[Math.floor(Math.random()*shapes.length)];
state.pattern = ['running','grid','herringbone'][Math.floor(Math.random()*3)];
state.color = colors[Math.floor(Math.random()*colors.length)].value;
document.getElementById('pattern').value = state.pattern;
setShape(state.shape);updateSwatches();rebuildPavers();
const toast = document.getElementById('toast');toast.classList.add('show');setTimeout(() => toast.classList.remove('show'), 1300);
});

addHouse();
addYardDetails();
updateSwatches();
rebuildPavers();

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
camera.aspect = innerWidth / innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
