<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QAZ PLIT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fff;
color:#222;
}

/* ШАПКА */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:fixed;
width:100%;
z-index:1000;
}

/* НОВЫЙ ЛОГОТИП */

.logo{
width:150px;
height:auto;
object-fit:contain;
}

nav a{
margin-left:25px;
text-decoration:none;
color:#222;
font-weight:600;
}

/* ГЛАВНОЕ ФОТО */

.hero{

height:100vh;

background-image:
linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.45)
),

url('img.jpeg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

color:white;

}

.hero-content h1{
font-size:60px;
margin-bottom:20px;
}

.hero-content p{
font-size:22px;
margin-bottom:25px;
}

.btn{

padding:15px 30px;
background:#000;
color:white;
text-decoration:none;
border-radius:8px;

}

section{
padding:80px 40px;
}

.cards{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.card{

background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.1);

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}

.card-body{
padding:20px;
}

footer{

background:#111;
color:white;
padding:40px;
text-align:center;

}

</style>
</head>

<body>

<header>

<!-- НОВЫЙ ЛОГОТИП -->

<img
src="Logonew.png"
class="logo"
alt="QAZ PLIT">

<nav>

<a href="#">Главная</a>
<a href="#">Каталог</a>
<a href="#">О нас</a>
<a href="#">Контакты</a>

</nav>

</header>


<!-- НОВОЕ ГЛАВНОЕ ФОТО -->

<section class="hero">

<div class="hero-content">

<h1>
QAZ PLIT
</h1>

<p>
Производство тротуарной плитки
</p>

<a class="btn">
Смотреть каталог
</a>

</div>

</section>



<section>

<h2>
Каталог
</h2>

<br>

<div class="cards">

<div class="card">

<img src="img.jpeg">

<div class="card-body">

<h3>
Плитка
</h3>

<p>
Качественная тротуарная плитка
</p>

</div>

</div>


<div class="card">

<img src="img.jpeg">

<div class="card-body">

<h3>
Брусчатка
</h3>

<p>
Для двора и дорожек
</p>

</div>

</div>

</div>

</section>



<footer>

QAZPLIT © 2026

</footer>


</body>
</html>
